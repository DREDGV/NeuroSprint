name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  unit-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check text encoding
        run: npm run check:encoding

      - name: Run unit/integration tests
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (Edge)
        run: npx playwright install msedge

      - name: Run e2e
        run: npm run test:e2e
